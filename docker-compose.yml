version: '3.8'

services:

  # ─── Laravel Application ───────────────────────────────────────────────────
  jeem-app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: jeem-portal-app
    restart: unless-stopped
    ports:
      - "8080:80"           # Access app at http://localhost:8080
    environment:
      APP_NAME: salepropos
      APP_ENV: production
      APP_KEY: "${APP_KEY}"
      APP_DEBUG: "false"
      APP_URL: "http://localhost:8080"
      APP_TIMEZONE: Asia/Dubai

      DB_CONNECTION: mysql
      DB_HOST: jeem-db       # container name of MySQL service
      DB_PORT: 3306
      DB_DATABASE: "${DB_DATABASE:-jeem_portal}"
      DB_USERNAME: "${DB_USERNAME:-jeem_user}"
      DB_PASSWORD: "${DB_PASSWORD:-secret}"

      CACHE_DRIVER: file
      QUEUE_CONNECTION: sync
      SESSION_DRIVER: file
      SESSION_LIFETIME: 120
      LOG_CHANNEL: stack

    volumes:
      - ./storage:/var/www/html/storage
      - ./bootstrap/cache:/var/www/html/bootstrap/cache
    networks:
      - jeem-network
    depends_on:
      jeem-db:
        condition: service_healthy

  # ─── MySQL Database ─────────────────────────────────────────────────────────
  jeem-db:
    image: mysql:8.0
    container_name: jeem-portal-db
    restart: unless-stopped
    environment:
      MYSQL_DATABASE: "${DB_DATABASE:-jeem_portal}"
      MYSQL_USER: "${DB_USERNAME:-jeem_user}"
      MYSQL_PASSWORD: "${DB_PASSWORD:-secret}"
      MYSQL_ROOT_PASSWORD: "${DB_ROOT_PASSWORD:-rootsecret}"
    ports:
      - "3307:3306"          # Exposed on host port 3307 to avoid conflict with XAMPP's MySQL
    volumes:
      - jeem-db-data:/var/lib/mysql
      - ./docker/mysql/init.sql:/docker-entrypoint-initdb.d/init.sql
    networks:
      - jeem-network
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-p${DB_ROOT_PASSWORD:-rootsecret}"]
      interval: 10s
      timeout: 5s
      retries: 5

# ─── Volumes ──────────────────────────────────────────────────────────────────
volumes:
  jeem-db-data:
    driver: local

# ─── Networks ─────────────────────────────────────────────────────────────────
networks:
  jeem-network:
    driver: bridge
